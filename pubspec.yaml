name: vimal_coaching_institute
description: "Educational course selling app with admin panel, YouTube/Google Drive integration, and Razorpay payments."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_database: ^10.4.0
  
  # UI & Navigation
  get: ^4.6.6
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.1
  
  # Video & Media
  youtube_player_flutter: ^9.0.0
  video_player: ^2.8.1
  
  # PDF Viewer
  pdf: ^3.10.4
  pdfx: ^2.5.0
  
  # Payment Gateway
  razorpay_flutter: ^1.3.6
  upi_india: ^3.0.1
  
  # State Management
  provider: ^6.1.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Image Handling
  image_picker: ^1.0.4
  image_cropper: ^5.0.1
  
  # Notifications
  flutter_local_notifications: ^16.1.0
  
  # Utils
  connectivity_plus: ^5.0.1
  permission_handler: ^11.4.0
  url_launcher: ^6.2.1
  webview_flutter: ^4.4.2
  share_plus: ^7.2.1
  uuid: ^4.2.1
  
  # Charts & Analytics
  fl_chart: ^0.65.0
  
  # Carousel
  carousel_slider: ^4.2.1
  
  # Loading & Shimmer
  shimmer: ^3.0.0
  
  # Toast
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
