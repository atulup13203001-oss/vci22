name: vimal_coaching_institute
description: Educational course selling app with admin panel, YouTube/Google Drive integration, and Razorpay payments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.4

  # UI & Navigation
  get: ^4.6.6
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.12

  # Video player
  youtube_player_iframe: ^5.2.2

  # PDF viewer - downgraded to work with Dart 3.6.0
  pdfrx: ^1.0.103

  # Payment
  razorpay_flutter: ^1.3.7

  # Utilities
  http: ^1.2.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  intl: ^0.19.0
  path_provider: ^2.1.5

  # Charts
  fl_chart: ^0.69.2

  # Image picker
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
