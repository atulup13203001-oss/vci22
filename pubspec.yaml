name: vimal_coaching_institute
description: Educational course selling app with admin panel, YouTube/Google Drive integration, and Razorpay payments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.4

  get: ^4.6.6
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.12

  youtube_player_iframe: ^5.1.0
  pdfrx: ^1.0.101
  razorpay_flutter: ^1.3.7

  http: ^1.2.2
  share_plus: ^10.1.4
  url_launcher: ^6.2.1
  uuid: ^4.5.1
  intl: ^0.19.0
  path_provider: ^2.1.5

  fl_chart: ^0.69.2
  image_picker: ^1.1.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
