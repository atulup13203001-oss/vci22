name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: false

      # Delete old android folder that may contain v1 embedding
      - name: Delete old android folder
        run: rm -rf android

      # Regenerate fresh android folder with v2 embedding
      - name: Regenerate android folder
        run: flutter create --platforms=android --project-name=vimal_coaching_institute .

      # Restore google-services.json (must be committed in repo)
      - name: Restore google-services.json
        run: |
          if [ -f google-services.json ]; then
            cp google-services.json android/app/
          else
            echo "google-services.json not found in repo root"
            exit 1
          fi

      # Add multidex support
      - name: Add multidex
        run: |
          sed -i '/defaultConfig {/a \            multiDexEnabled true' android/app/build.gradle
          echo -e '\ndependencies {\n    implementation "androidx.multidex:multidex:2.0.1"\n}' >> android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
