name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: false

      - name: Clean everything
        run: |
          flutter clean
          rm -rf ~/.gradle/caches/
          rm -rf ~/.pub-cache
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -rf android/app/src/main/java/io/flutter

      - name: Fix AndroidManifest.xml
        run: |
          # Ensure flutterEmbedding is set to 2
          sed -i 's/flutterEmbedding" android:value="[0-9]"/flutterEmbedding" android:value="2"/g' android/app/src/main/AndroidManifest.xml
          # Remove any reference to FlutterApplication
          sed -i 's/android:name="io.flutter.app.FlutterApplication"//g' android/app/src/main/AndroidManifest.xml
          # Fix activity reference
          sed -i 's/io.flutter.app.FlutterActivity/io.flutter.embedding.android.FlutterActivity/g' android/app/src/main/AndroidManifest.xml

      - name: Force v2 embedding in build.gradle
        run: |
          echo 'android {
              defaultConfig {
                  manifestPlaceholders = [flutterEmbedding: "2"]
              }
          }' >> android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
