name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Use a known working version before v1 embedding was removed
          flutter-version: '3.22.4'
          # Use a specific channel to ensure stability
          channel: 'stable'
          # Force cache invalidation to avoid version mismatch errors
          cache-key: 'flutter-3.22.4-cache-key'

      # Clear all possible cached references to the v1 embedding
      - name: Clear Gradle and Pub Cache
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -rf $HOME/.pub-cache

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
